name: Build quectel-CM-M ipk (debug)

on:
  workflow_dispatch:

env:
  TZ: Asia/Bangkok
  SDK_NAME: openwrt-sdk-23.05.5-mvebu-cortexa53_gcc-12.3.0_musl.Linux-x86_64
  SDK_EXT: tar.xz
  SDK_URL: https://downloads.openwrt.org/releases/23.05.5/targets/mvebu/cortexa53/
  SDK_ARCH: aarch64_cortex-a53
  PACKAGE_FEED_DIR: quectel_CM_5G_M

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Install build dependencies
        run: |
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install zstd build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-venv rsync unzip zlib1g-dev file wget
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: qmodem

      - name: Cache OpenWrt SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: sdk
          key: ${{ runner.os }}-${{ env.SDK_NAME }}-qmodem-debug-v1

      - name: Download and extract SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          wget "${{ env.SDK_URL }}${{ env.SDK_NAME }}.${{ env.SDK_EXT }}"
          mkdir sdk
          tar -xvf "${{ env.SDK_NAME }}.${{ env.SDK_EXT }}" -C sdk --strip-components=1

      - name: Initialization environment
        run: |
          cd sdk
          cat > feeds.conf <<EOF
          src-git base https://github.com/openwrt/openwrt.git;main
          src-git packages https://github.com/openwrt/packages.git;master
          src-git luci https://github.com/openwrt/luci.git;master
          src-git routing https://git.openwrt.org/feed/routing.git;master
          EOF
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          cd ..
          echo "src-link qmodem $GITHUB_WORKSPACE/qmodem" >> sdk/feeds.conf
          cd sdk
          ./scripts/feeds update qmodem
          ./scripts/feeds install -a -p qmodem
          echo "CONFIG_ALL_NONSHARED=n" > .config
          echo "CONFIG_ALL_KMODS=n" >> .config
          echo "CONFIG_ALL=n" >> .config
          echo "CONFIG_AUTOREMOVE=n" >> .config
          echo "CONFIG_LUCI_LANG_zh_Hans=y" >> .config
          cat ../qmodem/.github/workflows/openwrt_package.config >> .config
          make defconfig
          make clean
          make download -j$(nproc) || true

      - name: Build quectel-CM-M with verbose debug log
        run: |
          cd sdk
          mkdir -p "$GITHUB_WORKSPACE/artifacts"
          make package/${{ env.PACKAGE_FEED_DIR }}/compile -j1 V=s 2>&1 | tee "$GITHUB_WORKSPACE/artifacts/quectel-CM-M-build.log"

      - name: Collect build artifacts
        if: always()
        run: |
          mkdir -p artifacts/ipk
          find sdk/bin/packages -type f -name '*.ipk' -path "*/qmodem/*" -exec cp -v {} artifacts/ipk/ \;

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quectel-CM-M-arm64-ipk-debug
          path: |
            artifacts/quectel-CM-M-build.log
            artifacts/ipk/*.ipk
          if-no-files-found: warn
          retention-days: 7
