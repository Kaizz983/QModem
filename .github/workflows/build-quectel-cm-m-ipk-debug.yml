name: Build quectel-CM-M ipk (debug)

on:
  workflow_dispatch:

env:
  TZ: Asia/Bangkok
  SDK_NAME: openwrt-sdk-23.05.5-mvebu-cortexa53_gcc-12.3.0_musl.Linux-x86_64
  SDK_EXT: tar.xz
  SDK_URL: https://downloads.openwrt.org/releases/23.05.5/targets/mvebu/cortexa53/
  SDK_ARCH: aarch64_cortex-a53
  OPENWRT_FEED_BRANCH: openwrt-23.05
  PACKAGE_NAME: quectel-CM-5G-M
  PACKAGE_FEED_DIR: quectel_CM_5G_M

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Install build dependencies
        run: |
          sudo apt-get -qq update
          sudo apt-get -qq install \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses5-dev libssl-dev python3 rsync unzip zlib1g-dev \
            file wget

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: qmodem

      - name: Cache OpenWrt SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: sdk
          key: ${{ runner.os }}-${{ env.SDK_NAME }}-qmodem-debug-v1

      - name: Download and extract SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          wget "${{ env.SDK_URL }}${{ env.SDK_NAME }}.${{ env.SDK_EXT }}"
          mkdir sdk
          tar -xvf "${{ env.SDK_NAME }}.${{ env.SDK_EXT }}" -C sdk --strip-components=1

      - name: Prepare SDK feeds and config
        run: |
          cd sdk
          cat > feeds.conf <<EOF
          src-git packages https://github.com/openwrt/packages.git;${{ env.OPENWRT_FEED_BRANCH }}
          src-git luci https://github.com/openwrt/luci.git;${{ env.OPENWRT_FEED_BRANCH }}
          src-git routing https://git.openwrt.org/feed/routing.git;${{ env.OPENWRT_FEED_BRANCH }}
          src-link qmodem $GITHUB_WORKSPACE/qmodem
          EOF
          ./scripts/feeds update packages luci routing qmodem
          ./scripts/feeds install -p packages json-c
          ./scripts/feeds install -p qmodem ${{ env.PACKAGE_NAME }}
          echo "CONFIG_ALL=n" > .config
          echo "CONFIG_AUTOREMOVE=n" >> .config
          echo "CONFIG_PACKAGE_libjson-c=y" >> .config
          echo "CONFIG_PACKAGE_${{ env.PACKAGE_NAME }}=m" >> .config
          make defconfig

      - name: Build quectel-CM-M with verbose debug log
        run: |
          cd sdk
          mkdir -p "$GITHUB_WORKSPACE/artifacts"
          make package/feeds/packages/json-c/compile -j1 V=s 2>&1 | tee "$GITHUB_WORKSPACE/artifacts/quectel-CM-M-build.log"
          make package/${{ env.PACKAGE_FEED_DIR }}/compile -j1 V=s 2>&1 | tee -a "$GITHUB_WORKSPACE/artifacts/quectel-CM-M-build.log"

      - name: Collect build artifacts
        if: always()
        run: |
          mkdir -p artifacts/ipk
          find sdk/bin/packages -type f -name '*.ipk' -path "*/qmodem/*" -exec cp -v {} artifacts/ipk/ \;

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quectel-CM-M-arm64-ipk-debug
          path: |
            artifacts/quectel-CM-M-build.log
            artifacts/ipk/*.ipk
          if-no-files-found: warn
          retention-days: 7
